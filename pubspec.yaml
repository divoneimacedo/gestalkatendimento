name: gestalk_flutter_desktop
description: Base inicial Flutter Desktop para atendimento por video da Gestalk.
publish_to: 'none'
version: 1.0.7+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  json_annotation: ^4.9.0
  provider: ^6.1.2
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  #flutter_secure_storage: ^9.2.2  
  flutter_local_notifications: ^18.0.1
  audioplayers: ^6.1.0
  tray_manager: ^0.3.0
  window_manager: ^0.4.3
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  file_selector: ^1.0.3
  intl: ^0.19.0
  pdf: ^3.11.1
  printing: ^5.13.4
  socket_io_client: ^3.0.2
  permission_handler: ^12.0.3
  package_info_plus: ^8.3.1
  videosdk: 3.9.0
  videosdk_webrtc:
    path: third_party/videosdk_webrtc_0_0_17
  videosdk_linux_shim:
    path: third_party/videosdk_linux_shim
  local_notifier: ^0.1.6
  ffi: ^2.2.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_linux: ^1.2.1
  media_kit_libs_windows_video: ^1.0.11
  media_kit_libs_macos_video: ^1.1.4
dev_dependencies:
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.9.0

dependency_overrides:
  videosdk_webrtc:
    path: third_party/videosdk_webrtc_0_0_17
  local_notifier:
    path: third_party/local_notifier_windows

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/icons/
    - assets/images/
